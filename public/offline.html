<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e40af" />
    <title>COP Year Portal Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border-radius: 28px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        border: 1px solid #e2e8f0;
      }
      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }
      h1 {
        margin: 18px 0 8px;
        font-size: clamp(28px, 8vw, 42px);
        line-height: 1;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.65;
        font-weight: 700;
      }
      a {
        display: inline-flex;
        margin-top: 22px;
        border-radius: 18px;
        background: #1e40af;
        color: #ffffff;
        padding: 13px 18px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/cop.png" alt="COP Logo" />
      <h1>You are offline</h1>
      <p>
        The COP Year Portal is installed and available.  Pages can still open, and fresh calendar or personnel updates will load when your connection returns.
      </p>
      <a href="/">Open Home</a>
    </main>
  </body>
</html>
